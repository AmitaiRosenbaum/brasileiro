services:
  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile.dev
    ports:
      - 8080:8080
    volumes:
      - ./front-end:/usr/local/app
      - /usr/local/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true

  back-end:
    build: ./back-end
    ports:
      - 8000:8000
