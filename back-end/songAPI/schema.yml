components:
  schemas:
    Artist:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        birth:
          type: string
          format: date
          nullable: true
        death:
          type: string
          format: date
          nullable: true
      required:
      - name
    BlankEnum:
      enum:
      - ''
    Group:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 150
      required:
      - name
      - url
    ModeEnum:
      enum:
      - major
      - minor
      type: string
      description: "* `major` - Major\n* `minor` - Minor\n* `` - "
    NullEnum:
      enum:
      - null
    PaginatedArtistList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Artist'
    PaginatedGroupList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Group'
    PaginatedSongList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Song'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedGroup:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 150
    PatchedSong:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        version:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        mode:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/ModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        tonic_base:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TonicBaseEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        tonic_accidental:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TonicAccidentalEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        year:
          type: string
          format: date
          nullable: true
        genre:
          type: string
          nullable: true
          maxLength: 50
        file:
          type: string
          format: uri
        artist:
          type: array
          items:
            type: integer
    PatchedUser:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        groups:
          type: array
          items:
            type: string
            format: uri
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
    Song:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        version:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        mode:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/ModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        tonic_base:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TonicBaseEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        tonic_accidental:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TonicAccidentalEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        year:
          type: string
          format: date
          nullable: true
        genre:
          type: string
          nullable: true
          maxLength: 50
        file:
          type: string
          format: uri
        artist:
          type: array
          items:
            type: integer
      required:
      - artist
      - file
      - name
      - version
    TonicAccidentalEnum:
      enum:
      - '#'
      - '##'
      - b
      - bb
      type: string
      description: "* `#` - ♯\n* `##` - ♯♯\n* `b` - ♭\n* `bb` - ♭♭\n* `` - "
    TonicBaseEnum:
      enum:
      - A
      - B
      - C
      - D
      - E
      - F
      - G
      type: string
      description: |-
        * `A` - A
        * `B` - B
        * `C` - C
        * `D` - D
        * `E` - E
        * `F` - F
        * `G` - G
    User:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        groups:
          type: array
          items:
            type: string
            format: uri
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
      required:
      - url
      - username
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
