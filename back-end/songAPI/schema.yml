components:
  schemas:
    Group:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 150
      required:
      - name
      - url
    KeyEnum:
      enum:
      - C
      - C#
      - Cb
      - D
      - D#
      - Db
      - E
      - E#
      - Eb
      - F
      - F#
      - Fb
      - G
      - G#
      - Gb
      - A
      - A#
      - Ab
      - B
      - B#
      - Bb
      type: string
      description: |-
        * `C` - C
        * `C#` - C♯
        * `Cb` - C♭
        * `D` - D
        * `D#` - D♯
        * `Db` - D♭
        * `E` - E
        * `E#` - E♯
        * `Eb` - E♭
        * `F` - F
        * `F#` - F♯
        * `Fb` - F♭
        * `G` - G
        * `G#` - G♯
        * `Gb` - Gurl♭
        * `A` - A
        * `A#` - A♯
        * `Ab` - A♭
        * `B` - B
        * `B#` - B♯
        * `Bb` - B♭
    PaginatedGroupList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Group'
    PaginatedSongList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Song'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedGroup:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 150
    PatchedSong:
      type: object
      properties:
        url:
          type: string
          maxLength: 200
        name:
          type: string
          maxLength: 200
        artist:
          type: string
          maxLength: 200
        key:
          $ref: '#/components/schemas/KeyEnum'
        year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
    PatchedUser:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        groups:
          type: array
          items:
            type: string
            format: uri
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
    Song:
      type: object
      properties:
        url:
          type: string
          maxLength: 200
        name:
          type: string
          maxLength: 200
        artist:
          type: string
          maxLength: 200
        key:
          $ref: '#/components/schemas/KeyEnum'
        year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
      required:
      - artist
      - key
      - name
      - url
      - year
    User:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        groups:
          type: array
          items:
            type: string
            format: uri
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
      required:
      - url
      - username
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
